apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-app
  namespace: demo
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: demo-strip-app1@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:
      - path: /app1
        pathType: Prefix
        backend:
          service:
            name: my-app
            port:
              number: 80
